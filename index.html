<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Red Hope | Blood Donation Network</title>

<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<!-- 🔔 OneSignal START -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "84ba381a-a07f-4a4a-a15b-fe68d94376af",
      path: "/RedHope-4/"
    });
  });
</script>
<!-- 🔔 OneSignal END -->

<style>
.landing{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fff0f0,#fff8f8);position:relative;overflow:hidden;}
.landing-card{background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.6);border-radius:28px;padding:60px 55px;max-width:620px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(220,38,38,.12);}
.landing-card h1{font-size:3.2rem;color:red;margin-bottom:12px;}
.landing-card p{font-size:1.05rem;line-height:1.7;margin-bottom:36px;}
.btn-group{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
.btn-hero{padding:14px 32px;border-radius:30px;font-size:1rem;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:8px;}
.btn-hero-primary{background:red;color:white;}
.btn-hero-outline{border:2px solid red;color:red;}
.features{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:40px;}
.feature{text-align:center;}
@media(max-width:600px){.features{grid-template-columns:1fr;}}
</style>

</head>

<body>

<div class="landing">
  <div class="landing-card">

    <h1>Red Hope</h1>
    <p>Every drop counts. Connect with blood donors and save lives.</p>

    <div class="btn-group">
      <a href="register.html" class="btn-hero btn-hero-primary">Register</a>
      <a href="login.html" class="btn-hero btn-hero-outline">Login</a>
    </div>

  </div>
</div>

<script src="shared.js"></script>
<script>
  initDB();
  if(getCurrentUser()) window.location.href='dashboard.html';
</script>

</body>
</html>
